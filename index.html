<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Soy Sauce Siya's Adventure</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700;800&family=Dancing+Script:wght@700&display=swap" rel="stylesheet">
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Montserrat', sans-serif;
            background-color: #e8f5e9;
            background-image: linear-gradient(rgba(232, 245, 233, 0.7), rgba(232, 245, 233, 0.7)), url('Screenshot 2026-05-15 at 6.19.48 PM.jpg');
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            background-attachment: fixed;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .card {
            width: 500px;
            background: rgba(255, 255, 255, 0.95);
            border-radius: 20px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.2);
            overflow: hidden;
            border: 8px solid #fff;
            backdrop-filter: blur(5px);
        }

        /* ── Planet / Orbit Zone ── */
        .world-header {
            height: 380px;
            background: #f1f8e9;
            position: relative;
            overflow: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        /* Planet sits centered, does NOT rotate — the orbit ring does */
        .planet-img {
            width: 340px;
            height: 340px;
            object-fit: cover;
            border-radius: 50%;
            position: absolute;
            z-index: 1;
            pointer-events: none;
            user-select: none;
        }

        /* Invisible circle overlay to capture clicks */
        .click-overlay {
            position: absolute;
            width: 340px;
            height: 340px;
            border-radius: 50%;
            z-index: 5;
            cursor: crosshair;
        }

        /* Orbit ring — same size as planet, centered */
        .character-orbit {
            position: absolute;
            width: 340px;
            height: 340px;
            z-index: 3;
            pointer-events: none;
            transition: transform 1.2s cubic-bezier(0.25, 1, 0.5, 1);
            transform: rotate(0deg);
        }

        /* Soy bottle sits at the very top of the ring */
        .character-wrapper {
            position: absolute;
            top: -38px;
            left: 50%;
            transform: translateX(-50%);
            width: 64px;
            height: 100px;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .character {
            width: 100%;
            height: auto;
            filter: drop-shadow(0 5px 10px rgba(0,0,0,0.35));
            transition: transform 1.2s cubic-bezier(0.25, 1, 0.5, 1);
            transform: rotate(0deg);
            animation: float 3s ease-in-out infinite;
        }

        @keyframes float {
            0%, 100% {
                margin-top: 0px;
            }

            50% {
                margin-top: -8px;
            }
        }

        /* ── Content Area ── */
        .content {
            padding: 20px;
            text-align: center;
        }

        .title {
            font-family: 'Dancing Script', cursive;
            font-size: 2rem;
            color: #2e7d32;
            margin-bottom: 15px;
        }

        /* ── Shop Grid ── */
        .shop-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 8px;
            background: rgba(241, 248, 233, 0.5);
            padding: 12px;
            border-radius: 15px;
        }

        .shop-item {
            background: white;
            padding: 12px 5px;
            border-radius: 10px;
            cursor: pointer;
            transition: all 0.2s;
            border: 2px solid transparent;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 60px;
        }

            .shop-item:hover:not(.locked) {
                background: #f9fdf9;
                transform: translateY(-1px);
            }

            .shop-item.selected {
                border-color: #81c784;
                background: #e8f5e9;
            }

            .shop-item.locked {
                background: #e0e0e0;
                cursor: not-allowed;
                opacity: 0.6;
            }

                .shop-item.locked .shop-name {
                    color: #9e9e9e;
                }

            .shop-item.unlocked {
                background: #fff;
                border: 2px solid #2e7d32;
                animation: pulse 1.5s infinite;
                cursor: pointer;
            }

        @keyframes pulse {
            0% {
                box-shadow: 0 0 0 0 rgba(46, 125, 50, 0.4);
            }

            70% {
                box-shadow: 0 0 0 10px rgba(46, 125, 50, 0);
            }

            100% {
                box-shadow: 0 0 0 0 rgba(46, 125, 50, 0);
            }
        }

        .shop-name {
            font-size: 0.6rem;
            font-weight: 800;
            text-transform: uppercase;
            color: #388e3c;
            line-height: 1.2;
            text-align: center;
        }

        /* ── Message Box ── */
        .message-area {
            margin-top: 15px;
            padding: 18px;
            background: #2e7d32;
            color: white;
            border-radius: 15px;
            min-height: 180px;
            max-height: 250px;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            justify-content: center;
            transition: all 0.3s ease;
            text-align: left;
            line-height: 1.6;
        }

        .msg-en {
            font-style: italic;
            font-size: 0.85rem;
            margin-bottom: 5px;
        }

        .msg-bn {
            font-size: 0.8rem;
            opacity: 0.8;
            border-top: 1px solid rgba(255,255,255,0.2);
            padding-top: 5px;
        }

        .progress-text {
            font-size: 0.7rem;
            color: #1b5e20;
            margin-top: 10px;
            font-weight: bold;
        }
    </style>
</head>
<body>

    <div class="card">

        <!-- ── Planet Zone ── -->
        <div class="world-header">
            <img src="planet.png" class="planet-img">

            <!-- Invisible click catcher -->
            <div class="click-overlay" id="planetOverlay"></div>

            <!-- Orbit ring with soy bottle -->
            <div class="character-orbit" id="orbitRing">
                <div class="character-wrapper">
                    <img src="character.png" class="character" id="soySauce">
                </div>
            </div>
        </div>

        <!-- ── Card Content ── -->
        <div class="content">
            <div class="title">Soy Sauce Siya's Adventure</div>

            <div class="shop-grid">
                <div class="shop-item" onclick="go(this, 'hutao')" data-id="hutao">
                    <span class="shop-name">Meet Hu Tao</span>
                </div>
                <div class="shop-item" onclick="go(this, 'porsche')" data-id="porsche">
                    <span class="shop-name">Porsche</span>
                </div>
                <div class="shop-item" onclick="go(this, 'boba')" data-id="boba">
                    <span class="shop-name">Coco Boba</span>
                </div>
                <div class="shop-item" onclick="go(this, 'physics')" data-id="physics">
                    <span class="shop-name">Grade 11 Physics</span>
                </div>
                <div class="shop-item" onclick="go(this, 'totoro')" data-id="totoro">
                    <span class="shop-name">Meet Totoro</span>
                </div>
                <div class="shop-item" onclick="go(this, 'gaming')" data-id="gaming">
                    <span class="shop-name">Gaming</span>
                </div>
                <div class="shop-item locked" id="magicShopBtn" onclick="tryMagicShop(this)" data-id="magic">
                    <span class="shop-name">Magic Shop</span>
                </div>
            </div>

            <div class="message-area" id="msgBox">
                <div class="msg-en">Where should Siya travel next?</div>
            </div>
            <div class="progress-text" id="progress">Locations Visited: 0/6</div>
        </div>
    </div>

    <script>
        // ── Location Data ──
        // angle: where on the orbit ring the bottle stops (0° = top, clockwise)
        const locations = {
            hutao: {
                angle: 347,
                text: `Hu Tao’s personality fits you really well because you’re so happy, energetic, and caring :3 You always bring that fun chaotic energy that makes everything more exciting.`
            },

            porsche: {
                angle: 10,
                text: `Happy Birthday 💚 I hope this year takes you to all your dream destinations and goals — smooth roads, good vibes, and maybe even a Porsche moment or two. I know with all your hard work and dedication, getting that Porsche will be an ease. It’s only a matter of time :)`
            },

            boba: {
                angle: 67,
                text: `Your taste in boba might be limited, but my love and appreciation for you isn’t 😄 We both know brown sugar milk tea always hits. This is just one similarity, but I really do believe we are forever soulmates … maisy <3`
            },

            physics: {
                angle: 127,
                text: `I still remember Grade 11 Physics — sitting together for the first time, laughing way too much, and almost getting kicked out because we couldn’t stop joking around. From all the silly lab mistakes to not paying attention when we definitely should’ve, those moments were honestly some of the best. I’m really glad we met each other there. I will never forget about Sonic Boom :3`
            },

            totoro: {
                angle: 180,
                text: `Siya, you are always so calm and composed, like Totoro — just a quiet, sweet, comforting presence that makes everything feel a little lighter. Being around you feels really peaceful, like a calming companion you can always rely on.`
            },

            gaming: {
                angle: 235,
                text: `I’ve always loved how much gaming is part of you — Genshin, Roblox, always on your phone doing something, and even that keychain you got because of gaming. It just fits you so well. And honestly, playing games with you is always the best part — you make everything way more fun.`
            },

            magic: {
                angle: 285,
                text: `Happy Birthday Soy Sauce Siyaaaa!!!! 🎉🥳🎂🦄🌈😜😝🎊`
            }
        };

        const TOTAL_REQUIRED = 6;
        let visited = new Set();
        let currentRotation = 0;

        const orbitRing = document.getElementById('orbitRing');
        const soySauce = document.getElementById('soySauce');
        const msgBox = document.getElementById('msgBox');
        const progress = document.getElementById('progress');

        /* ── Smooth orbital rotation ── */
        function rotateTo(targetAngle) {
            let currentNorm = ((currentRotation % 360) + 360) % 360;
            let delta = targetAngle - currentNorm;
            if (delta > 180) delta -= 360;
            if (delta < -180) delta += 360;
            currentRotation += delta;

            orbitRing.style.transform = `rotate(${currentRotation}deg)`;
            // Counter-rotate bottle so it stays upright
            soySauce.style.transform = `rotate(${-currentRotation}deg)`;
        }

        /* ── Visit a regular location ── */
        function go(btn, id) {
            const loc = locations[id];
            if (!loc) return;

            visited.add(id);
            rotateTo(loc.angle);

            // Update message
            msgBox.innerHTML = `
            <div class="msg-en">${loc.text}</div>`;

            // Highlight selected button
            document.querySelectorAll('.shop-item').forEach(s => s.classList.remove('selected'));
            btn.classList.add('selected');

            // Progress
            const count = visited.size;
            progress.innerText = `Locations Visited: ${count}/6`;

            if (count >= TOTAL_REQUIRED) {
                const magicBtn = document.getElementById('magicShopBtn');
                magicBtn.classList.remove('locked');
                magicBtn.classList.add('unlocked');
                progress.innerText = '✨ Magic Shop is now UNLOCKED! ✨';
            }
        }

        /* ── Magic Shop (locked until all 6 visited) ── */
        function tryMagicShop(btn) {
            if (btn.classList.contains('locked')) {
                msgBox.innerHTML = `
                    <div class="msg-en" style="color:#ffcdd2;">"The Magic Shop is hidden. Visit all 6 spots first!"</div>
                    <div class="msg-bn">জাদুর দোকান লুকানো। আগে অন্য ৬টি জায়গায় যান!</div>
                `;
                return;
            }
            const loc = locations['magic'];
            rotateTo(loc.angle);
            msgBox.innerHTML = `
            <div class="msg-en">${loc.text}</div>`;
            document.querySelectorAll('.shop-item').forEach(s => s.classList.remove('selected'));
            btn.classList.add('selected');
        }

        /* ── Optional: clicking the planet edge also snaps to nearest location ── */
        document.getElementById('planetOverlay').addEventListener('click', (e) => {
            const rect = e.currentTarget.getBoundingClientRect();
            const cx = rect.width / 2, cy = rect.height / 2;
            let deg = Math.atan2(e.clientY - rect.top - cy, e.clientX - rect.left - cx) * (180 / Math.PI) + 90;
            if (deg < 0) deg += 360;

            // Find closest unlocked location
            const keys = Object.keys(locations).filter(k => k !== 'magic' || !document.getElementById('magicShopBtn').classList.contains('locked'));
            let best = keys[0], bestDiff = 360;
            keys.forEach(k => {
                let diff = Math.abs(deg - locations[k].angle);
                if (diff > 180) diff = 360 - diff;
                if (diff < bestDiff) { bestDiff = diff; best = k; }
            });

            const btn = best === 'magic'
                ? document.getElementById('magicShopBtn')
                : document.querySelector(`[data-id="${best}"]`);
            if (btn) {
                best === 'magic' ? tryMagicShop(btn) : go(btn, best);
            }
        });
    </script>

</body>
</html>
